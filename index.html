<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>DEEP SPACE — Number Guessing Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --space:    #04060f;
      --deep:     #070d1f;
      --card:     #0b1228;
      --rim:      #1a2a4a;
      --blue:     #3b82f6;
      --glow:     #60a5fa;
      --ice:      #bae6fd;
      --orange:   #f97316;
      --red:      #ef4444;
      --green:    #10b981;
      --dim:      #334155;
      --muted:    #64748b;
      --text:     #e2e8f0;
      --mono:     'Courier Prime', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--space);
      font-family: 'Exo 2', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* ── STARFIELD ── */
    #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── NEBULA GLOW ── */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .nb1 { width:500px;height:300px;background:rgba(59,130,246,0.07);top:-100px;left:-100px; }
    .nb2 { width:400px;height:400px;background:rgba(249,115,22,0.05);bottom:-150px;right:-100px; }
    .nb3 { width:300px;height:300px;background:rgba(16,185,129,0.04);top:40%;left:30%; }

    /* ── PAGE LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── HEADER BAR ── */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 18px;
      border-bottom: 1px solid rgba(59,130,246,0.12);
      margin-bottom: 24px;
      animation: fadeIn 0.6s ease both;
    }
    .agency-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .live-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--green);
      letter-spacing: 2px;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.5} }

    /* ── PLANET SECTION ── */
    .planet-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
      animation: fadeIn 0.7s ease 0.1s both;
    }
    .orbit-wrapper {
      position: relative;
      width: 160px; height: 160px;
      margin-bottom: 16px;
    }
    /* orbit rings */
    .orbit-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(59,130,246,0.2);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
    }
    .ring1 { width:145px;height:145px;animation:spinRing 12s linear infinite; }
    .ring2 { width:130px;height:130px;animation:spinRing 8s linear infinite reverse; border-style:dashed; }
    @keyframes spinRing { from{transform:translate(-50%,-50%) rotate(0)} to{transform:translate(-50%,-50%) rotate(360deg)} }

    /* satellite dot on ring */
    .ring1::after {
      content:'';
      position:absolute;
      width:7px;height:7px;
      background:var(--glow);
      border-radius:50%;
      box-shadow:0 0 8px var(--glow);
      top:4px; left:50%;
      transform:translateX(-50%);
    }
    .ring2::after {
      content:'';
      position:absolute;
      width:5px;height:5px;
      background:var(--orange);
      border-radius:50%;
      box-shadow:0 0 6px var(--orange);
      bottom:2px; right:10px;
    }

    /* Planet canvas */
    #planetCanvas {
      position: absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      border-radius:50%;
      width:90px;height:90px;
    }

    .mission-title {
      font-size: clamp(26px,7vw,38px);
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--text);
      text-align: center;
      line-height: 1;
    }
    .mission-title span { color: var(--glow); }
    .mission-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 3px;
      text-align: center;
      margin-top: 5px;
    }

    /* ── TELEMETRY ROW ── */
    .telemetry {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 1px;
      background: var(--rim);
      border: 1px solid var(--rim);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 20px;
      animation: fadeIn 0.8s ease 0.2s both;
    }
    .telem-cell {
      background: var(--card);
      padding: 12px 10px;
      text-align: center;
    }
    .telem-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .telem-val {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--glow);
      line-height: 1;
      transition: color 0.3s;
    }
    .telem-val.warn { color: var(--orange); }
    .telem-val.crit { color: var(--red); animation: critBlink 0.6s ease infinite; }
    @keyframes critBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── MAIN CONSOLE ── */
    .console {
      background: var(--card);
      border: 1px solid var(--rim);
      border-radius: 8px;
      overflow: hidden;
      animation: fadeIn 0.9s ease 0.3s both;
    }

    /* Console top bar */
    .console-topbar {
      background: var(--deep);
      border-bottom: 1px solid var(--rim);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .console-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--blue);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .dot-group { display: flex; gap: 6px; }
    .dot-btn { width:10px;height:10px;border-radius:50%; }
    .dot-btn.r{background:#ef4444;} .dot-btn.y{background:#f59e0b;} .dot-btn.g{background:#22c55e;}

    /* Console body */
    .console-body { padding: 20px 18px 18px; }

    /* Fuel rods = lives */
    .fuel-section { margin-bottom: 18px; }
    .fuel-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .fuel-rods {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .fuel-rod {
      width: 28px;
      height: 52px;
      border-radius: 4px 4px 2px 2px;
      background: linear-gradient(180deg, #60a5fa 0%, #1d4ed8 100%);
      border: 1px solid rgba(96,165,250,0.4);
      box-shadow: 0 0 12px rgba(59,130,246,0.4), inset 0 0 8px rgba(255,255,255,0.1);
      position: relative;
      transition: all 0.5s ease;
      overflow: hidden;
    }
    .fuel-rod::before {
      content:'';
      position:absolute;
      top:0;left:0;right:0;
      height:40%;
      background:rgba(255,255,255,0.15);
      border-radius:4px 4px 0 0;
    }
    /* shimmer effect */
    .fuel-rod::after {
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
      animation:shimmer 2.5s ease infinite;
    }
    @keyframes shimmer {
      from{transform:translateX(-100%)} to{transform:translateX(200%)}
    }
    .fuel-rod.depleted {
      background:linear-gradient(180deg,#1e293b 0%,#0f172a 100%);
      border-color:rgba(51,65,85,0.5);
      box-shadow:none;
      height:20px;
    }
    .fuel-rod.depleted::after,.fuel-rod.depleted::before { display:none; }
    .fuel-rod.draining { animation:drainAnim 0.6s ease forwards; }
    @keyframes drainAnim {
      0%  { transform:scale(1.15); box-shadow:0 0 25px rgba(249,115,22,0.8); background:linear-gradient(180deg,#fb923c,#ea580c); }
      60% { height:52px; }
      100%{ height:20px; background:linear-gradient(180deg,#1e293b,#0f172a); border-color:rgba(51,65,85,0.5); box-shadow:none; }
    }
    .fuel-count {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      margin-left: 8px;
      align-self: center;
    }

    /* Sensor bar */
    .sensor-bar { margin-bottom: 18px; opacity:0; transition:opacity 0.4s; }
    .sensor-bar.on { opacity:1; }
    .sensor-header {
      display:flex;
      justify-content:space-between;
      font-family:var(--mono);
      font-size:9px;
      color:var(--muted);
      letter-spacing:2px;
      margin-bottom:5px;
    }
    .sensor-track {
      height:10px;
      background:var(--deep);
      border:1px solid var(--rim);
      border-radius:2px;
      overflow:hidden;
      position:relative;
    }
    .sensor-fill {
      height:100%;
      border-radius:2px;
      transition:width 0.8s cubic-bezier(0.34,1.2,0.64,1), background 0.6s;
      width:0%;
      position:relative;
    }
    .sensor-fill::after {
      content:'';
      position:absolute;
      top:0;right:0;
      width:4px;height:100%;
      background:rgba(255,255,255,0.6);
      border-radius:0 2px 2px 0;
    }

    /* Terminal input */
    .terminal-row {
      display:flex;
      align-items:center;
      gap:0;
      background:var(--deep);
      border:1px solid var(--rim);
      border-radius:4px;
      margin-bottom:14px;
      transition:border-color 0.2s, box-shadow 0.2s;
      overflow:hidden;
    }
    .terminal-row:focus-within {
      border-color:var(--blue);
      box-shadow:0 0 0 2px rgba(59,130,246,0.15);
    }
    .terminal-prompt {
      padding:0 12px;
      font-family:var(--mono);
      font-size:13px;
      color:var(--blue);
      background:rgba(59,130,246,0.07);
      border-right:1px solid var(--rim);
      height:100%;
      display:flex;
      align-items:center;
      white-space:nowrap;
      align-self:stretch;
    }
    #guessInput {
      flex:1;
      padding:14px 14px;
      font-family:var(--mono);
      font-size:26px;
      font-weight:700;
      letter-spacing:8px;
      background:transparent;
      border:none;
      color:var(--ice);
      outline:none;
      caret-color:var(--glow);
    }
    #guessInput::placeholder { color:var(--dim); font-size:14px; letter-spacing:3px; }
    #guessInput:disabled { opacity:0.3; cursor:not-allowed; }
    #guessInput::-webkit-inner-spin-button,
    #guessInput::-webkit-outer-spin-button { -webkit-appearance:none; }

    /* Result */
    #result {
      min-height:46px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:var(--mono);
      font-size:13px;
      letter-spacing:2px;
      text-align:center;
      border-radius:4px;
      margin-bottom:14px;
      transition:all 0.2s;
    }
    #result.active { animation:resultIn 0.3s cubic-bezier(0.34,1.4,0.64,1); padding:12px; }
    @keyframes resultIn { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
    #result.win  { color:var(--green);  background:rgba(16,185,129,0.08);  border:1px solid rgba(16,185,129,0.25); }
    #result.lose { color:var(--red);    background:rgba(239,68,68,0.08);   border:1px solid rgba(239,68,68,0.25); }
    #result.high { color:var(--orange); background:rgba(249,115,22,0.08);  border:1px solid rgba(249,115,22,0.2); }
    #result.low  { color:var(--orange); background:rgba(249,115,22,0.08);  border:1px solid rgba(249,115,22,0.2); }
    #result.err  { color:var(--red);    padding:12px; }

    /* Buttons */
    .btn-launch {
      width:100%;
      padding:15px;
      font-family:'Exo 2',sans-serif;
      font-weight:900;
      font-size:17px;
      letter-spacing:4px;
      text-transform:uppercase;
      border:none;
      border-radius:4px;
      cursor:pointer;
      background:linear-gradient(135deg,#1d4ed8,#2563eb,#3b82f6);
      color:#fff;
      box-shadow:0 4px 20px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
      transition:all 0.15s ease;
      position:relative;
      overflow:hidden;
      margin-bottom:10px;
    }
    .btn-launch::before {
      content:'';
      position:absolute;
      top:0;left:-100%;width:60%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);
      transition:left 0.5s ease;
    }
    .btn-launch:hover::before { left:150%; }
    .btn-launch:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(59,130,246,0.5); }
    .btn-launch:active { transform:scale(0.98); }
    .btn-launch:disabled { background:var(--dim); box-shadow:none; cursor:not-allowed; transform:none; }

    .btn-abort {
      width:100%;
      padding:11px;
      font-family:'Exo 2',sans-serif;
      font-weight:700;
      font-size:13px;
      letter-spacing:3px;
      text-transform:uppercase;
      border:1px solid var(--rim);
      border-radius:4px;
      cursor:pointer;
      background:transparent;
      color:var(--muted);
      transition:all 0.15s ease;
    }
    .btn-abort:hover { border-color:var(--muted); color:var(--text); background:rgba(255,255,255,0.03); }

    /* ── MISSION LOG ── */
    .log-section {
      margin-top:20px;
      animation: fadeIn 1s ease 0.4s both;
    }
    .log-header {
      font-family:var(--mono);
      font-size:9px;
      color:var(--muted);
      letter-spacing:3px;
      text-transform:uppercase;
      margin-bottom:8px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .log-header::after {
      content:'';flex:1;height:1px;background:var(--rim);
    }
    .log-entries {
      display:flex;
      flex-direction:column;
      gap:4px;
      max-height:120px;
      overflow-y:auto;
    }
    .log-entries::-webkit-scrollbar { width:3px; }
    .log-entries::-webkit-scrollbar-track { background:transparent; }
    .log-entries::-webkit-scrollbar-thumb { background:var(--rim); border-radius:2px; }
    .log-entry {
      font-family:var(--mono);
      font-size:11px;
      color:var(--muted);
      padding:5px 10px;
      background:var(--card);
      border:1px solid var(--rim);
      border-radius:3px;
      display:flex;
      gap:10px;
      animation:logIn 0.3s ease;
    }
    @keyframes logIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .log-time { color:var(--dim); min-width:60px; }
    .log-msg.ok  { color:var(--green); }
    .log-msg.bad { color:var(--red); }
    .log-msg.mid { color:var(--orange); }

    /* ── DEBRIS PARTICLES ── */
    .debris {
      position:fixed;
      pointer-events:none;
      font-size:16px;
      z-index:999;
      animation:debriFly 1.2s ease-out forwards;
    }
    @keyframes debriFly {
      0%  {transform:translate(0,0) scale(1) rotate(0deg);opacity:1;}
      100%{transform:translate(var(--dx),var(--dy)) scale(0) rotate(var(--dr));opacity:0;}
    }

    /* ── UTILS ── */
    @keyframes fadeIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-7px)} 40%{transform:translateX(7px)}
      60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    .shake { animation:shake 0.4s ease; }
    @keyframes winPulse {
      0%,100%{border-color:var(--rim)}
      50%{border-color:var(--green);box-shadow:0 0 40px rgba(16,185,129,0.2);}
    }
    .win-pulse { animation:winPulse 0.6s ease 4; }

    @media(max-width:480px){
      .mission-title{font-size:28px;}
      .fuel-rod{width:22px;height:44px;}
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="nebula nb1"></div>
<div class="nebula nb2"></div>
<div class="nebula nb3"></div>

<div class="page">

  <!-- Header -->
  <div class="header-bar">
    <div class="agency-tag">DEEP SPACE OPS // v2.4.1</div>
    <div class="live-tag"><div class="live-dot"></div>TRANSMISSION LIVE</div>
  </div>

  <!-- Planet section -->
  <div class="planet-section">
    <div class="orbit-wrapper">
      <div class="orbit-ring ring1"></div>
      <div class="orbit-ring ring2"></div>
      <canvas id="planetCanvas" width="90" height="90"></canvas>
    </div>
    <div class="mission-title">DEEP <span>SPACE</span></div>
    <div class="mission-sub">[ COORDINATE LOCK PROTOCOL ]</div>
  </div>

  <!-- Telemetry -->
  <div class="telemetry">
    <div class="telem-cell">
      <div class="telem-label">Min Coord</div>
      <div class="telem-val">001</div>
    </div>
    <div class="telem-cell">
      <div class="telem-label">Target</div>
      <div class="telem-val" style="font-size:16px;letter-spacing:3px">UNKNOWN</div>
    </div>
    <div class="telem-cell">
      <div class="telem-label">Max Coord</div>
      <div class="telem-val">100</div>
    </div>
  </div>

  <!-- Main Console -->
  <div class="console" id="console">
    <div class="console-topbar">
      <div class="console-title">MISSION CONSOLE</div>
      <div class="dot-group">
        <div class="dot-btn r"></div>
        <div class="dot-btn y"></div>
        <div class="dot-btn g"></div>
      </div>
    </div>
    <div class="console-body">

      <!-- Fuel rods = lives -->
      <div class="fuel-section">
        <div class="fuel-label">Reactor Cores — Remaining</div>
        <div class="fuel-rods" id="fuelRods">
          <div class="fuel-rod"></div>
          <div class="fuel-rod"></div>
          <div class="fuel-rod"></div>
          <div class="fuel-rod"></div>
          <div class="fuel-rod"></div>
          <div class="fuel-count" id="fuelCount">5 / 5</div>
        </div>
      </div>

      <!-- Sensor -->
      <div class="sensor-bar" id="sensorBar">
        <div class="sensor-header">
          <span>◀ DEEP SPACE</span>
          <span>PROXIMITY SENSOR</span>
          <span>ON TARGET ▶</span>
        </div>
        <div class="sensor-track">
          <div class="sensor-fill" id="sensorFill"></div>
        </div>
      </div>

      <!-- Terminal input -->
      <div class="terminal-row">
        <div class="terminal-prompt">$ coord_</div>
        <input
          type="number"
          id="guessInput"
          placeholder="_ _ _"
          min="1" max="100"
          inputmode="numeric"
          autocomplete="off"
        />
      </div>

      <!-- Result -->
      <div id="result"></div>

      <!-- Buttons -->
      <button class="btn-launch" id="guessBtn">🚀 LAUNCH PROBE</button>
      <button class="btn-abort"  id="restartBtn">⊘ ABORT &amp; NEW MISSION</button>
    </div>
  </div>

  <!-- Mission Log -->
  <div class="log-section">
    <div class="log-header">Mission Log</div>
    <div class="log-entries" id="logEntries">
      <div class="log-entry">
        <span class="log-time">[00:00]</span>
        <span class="log-msg">System initialized. Awaiting coordinate input.</span>
      </div>
    </div>
  </div>

</div>

<script>
/* ── STARFIELD ── */
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars;
  function init(){
    c.width = window.innerWidth; c.height = window.innerHeight;
    stars = Array.from({length:200},()=>({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:Math.random()*1.2+0.2,
      op:Math.random(), dir:Math.random()>0.5?1:-1,
      speed:Math.random()*0.006+0.002
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(const s of stars){
      s.op += s.speed * s.dir;
      if(s.op>=1||s.op<=0) s.dir*=-1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,210,255,${s.op*0.85})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  init(); draw();
  window.addEventListener('resize',init);
})();

/* ── PLANET ── */
(function(){
  const c = document.getElementById('planetCanvas');
  const ctx = c.getContext('2d');
  let offset = 0;
  function draw(){
    ctx.clearRect(0,0,90,90);
    ctx.save();
    ctx.beginPath();
    ctx.arc(45,45,38,0,Math.PI*2);
    ctx.clip();
    // base
    const bg = ctx.createLinearGradient(0,0,90,90);
    bg.addColorStop(0,'#1e3a5f');
    bg.addColorStop(0.5,'#1d4ed8');
    bg.addColorStop(1,'#0f172a');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,90,90);
    // cloud bands
    const bands = [
      {y:20,h:8,c:'rgba(96,165,250,0.25)',speed:0.3},
      {y:35,h:12,c:'rgba(147,197,253,0.15)',speed:0.5},
      {y:52,h:7,c:'rgba(59,130,246,0.2)',speed:0.4},
      {y:64,h:9,c:'rgba(30,64,175,0.3)',speed:0.25},
    ];
    for(const b of bands){
      ctx.fillStyle = b.c;
      ctx.beginPath();
      const s = (offset * b.speed) % 90;
      ctx.rect(-s, b.y, 90+s, b.h);
      ctx.fill();
    }
    // atmosphere rim
    const rim = ctx.createRadialGradient(45,45,30,45,45,43);
    rim.addColorStop(0,'transparent');
    rim.addColorStop(0.7,'transparent');
    rim.addColorStop(1,'rgba(96,165,250,0.35)');
    ctx.fillStyle = rim;
    ctx.beginPath(); ctx.arc(45,45,38,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
    offset++;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── GAME ── */
let secret = rand(), lives = 5, shots = 0, missionNum = 1;
let wins = 0, startTime = Date.now();
function rand(){ return Math.floor(Math.random()*100)+1; }

const input      = document.getElementById('guessInput');
const resultEl   = document.getElementById('result');
const guessBtn   = document.getElementById('guessBtn');
const restartBtn = document.getElementById('restartBtn');
const fuelRods   = document.getElementById('fuelRods');
const fuelCount  = document.getElementById('fuelCount');
const sensorBar  = document.getElementById('sensorBar');
const sensorFill = document.getElementById('sensorFill');
const consoleEl  = document.getElementById('console');
const logEntries = document.getElementById('logEntries');

function getRods(){ return fuelRods.querySelectorAll('.fuel-rod'); }

function getTime(){
  const s = Math.floor((Date.now()-startTime)/1000);
  return '['+String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')+']';
}

function addLog(msg, cls=''){
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-time">${getTime()}</span><span class="log-msg ${cls}">${msg}</span>`;
  logEntries.appendChild(el);
  logEntries.scrollTop = logEntries.scrollHeight;
}

function updateSensor(guess){
  const diff = Math.abs(guess - secret);
  const hot = Math.max(0, 100 - diff*2);
  sensorBar.classList.add('on');
  sensorFill.style.width = hot+'%';
  if(hot>70){ sensorFill.style.background='linear-gradient(90deg,#f97316,#ef4444)'; sensorFill.style.boxShadow='0 0 8px rgba(239,68,68,0.5)'; }
  else if(hot>40){ sensorFill.style.background='linear-gradient(90deg,#22c55e,#f97316)'; sensorFill.style.boxShadow=''; }
  else { sensorFill.style.background='linear-gradient(90deg,#1d4ed8,#3b82f6)'; sensorFill.style.boxShadow=''; }
}

function burnRod(){
  const active = Array.from(getRods()).filter(r=>!r.classList.contains('depleted'));
  if(!active.length) return;
  const r = active[active.length-1];
  r.classList.add('draining');
  setTimeout(()=>{ r.classList.remove('draining'); r.classList.add('depleted'); },600);
}

function setResult(txt,cls){
  resultEl.textContent=txt;
  resultEl.className='active '+cls;
}

function explode(type){
  const icons = type==='win'
    ? ['🚀','⭐','💫','🌟','✅','🛸','☄️']
    : ['💥','🌑','⚡','🔴','☠️','🌪️'];
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  for(let i=0;i<22;i++){
    const el=document.createElement('div');
    el.className='debris';
    el.textContent=icons[i%icons.length];
    const a=(i/22)*Math.PI*2, d=80+Math.random()*220;
    el.style.left=cx+'px'; el.style.top=cy+'px';
    el.style.setProperty('--dx',(Math.cos(a)*d)+'px');
    el.style.setProperty('--dy',(Math.sin(a)*d)+'px');
    el.style.setProperty('--dr',(Math.random()*720-360)+'deg');
    el.style.animationDelay=(Math.random()*0.25)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1500);
  }
}

function disable(){ input.disabled=true; guessBtn.disabled=true; }

function checkGuess(){
  const val = Number(input.value);
  if(!val||val<1||val>100||!Number.isInteger(val)){
    setResult('⚠ INVALID COORDINATE — Range: 1 to 100','err');
    consoleEl.classList.add('shake');
    setTimeout(()=>consoleEl.classList.remove('shake'),400);
    addLog('Invalid coordinate entered.','bad');
    input.value=''; return;
  }

  shots++; lives--;
  updateSensor(val);
  burnRod();
  fuelCount.textContent=`${lives} / 5`;

  // update telem ammo color
  const ammoEl = document.querySelectorAll('.telem-val')[1];
  if(lives<=1) ammoEl && (ammoEl.className='telem-val crit');
  else if(lives<=2) ammoEl && (ammoEl.className='telem-val warn');

  if(val===secret){
    setResult('✅  COORDINATE LOCKED — TARGET ACQUIRED!','win');
    consoleEl.classList.add('win-pulse');
    explode('win'); wins++;
    disable();
    guessBtn.textContent='🏆 MISSION SUCCESS';
    addLog(`TARGET CONFIRMED at coordinate ${secret}.`,'ok');
  } else if(lives===0){
    setResult(`💥  REACTOR DEPLETED — COORDINATE WAS ${secret}`,'lose');
    explode('lose'); disable();
    guessBtn.textContent='☠️ MISSION FAILED';
    addLog(`Mission failed. Target was ${secret}.`,'bad');
  } else if(val>secret){
    setResult('📡  SIGNAL OVERSHOOTS — Vector too high','high');
    addLog(`Probe ${val} → overshot. Adjust lower. (${lives} cores left)`,'mid');
  } else {
    setResult('📡  SIGNAL UNDERSHOOTS — Vector too low','low');
    addLog(`Probe ${val} → undershot. Adjust higher. (${lives} cores left)`,'mid');
  }

  input.value=''; input.focus();
}

function restartGame(){
  secret=rand(); lives=5; shots=0; missionNum++;
  startTime=Date.now();
  getRods().forEach(r=>r.classList.remove('depleted','draining'));
  fuelCount.textContent='5 / 5';
  sensorBar.classList.remove('on');
  sensorFill.style.width='0%';
  resultEl.textContent=''; resultEl.className='';
  consoleEl.classList.remove('win-pulse');
  guessBtn.textContent='🚀 LAUNCH PROBE';
  input.disabled=false; guessBtn.disabled=false;
  input.value=''; input.focus();
  document.querySelectorAll('.telem-val').forEach(v=>v.className='telem-val');
  addLog(`Mission #${missionNum} initialized. New target locked.`);
}

guessBtn.addEventListener('click',checkGuess);
restartBtn.addEventListener('click',restartGame);
input.addEventListener('keydown',e=>{ if(e.key==='Enter') checkGuess(); });
</script>
